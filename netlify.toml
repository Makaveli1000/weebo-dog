[functions]
  directory = "nonexistent_folder_xyz"[build]
  # CI= prevents Netlify from failing on warnings
  command = "CI= npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "/*.map"
  [headers.values]
    Content-Type = "application/json"